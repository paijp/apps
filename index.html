<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音声Todoメモ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@400&display=swap');

  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --surface2: #222228;
    --border: rgba(255,255,255,0.08);
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #f0eeff;
    --muted: rgba(240,238,255,0.45);
    --danger: #f87171;
    --green: #34d399;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  header {
    padding: 36px 24px 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(124,106,247,0.08) 0%, transparent 100%);
  }

  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }

  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 12px var(--accent);
  }

  h1 { font-size: 20px; font-weight: 500; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; color: var(--muted); padding-left: 18px; }

  .main { padding: 32px 20px; display: flex; flex-direction: column; align-items: center; gap: 32px; }

  /* MIC */
  .mic-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%; }

  #mic-btn {
    width: 100px; height: 100px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; position: relative;
  }
  #mic-btn:active { transform: scale(0.92); }
  #mic-btn.listening {
    border-color: var(--accent);
    background: rgba(124,106,247,0.15);
    animation: ripple 1.4s infinite;
  }
  #mic-btn.listening svg { stroke: var(--accent2); }

  @keyframes ripple {
    0%   { box-shadow: 0 0 0 0 rgba(124,106,247,0.45); }
    70%  { box-shadow: 0 0 0 24px rgba(124,106,247,0); }
    100% { box-shadow: 0 0 0 0 rgba(124,106,247,0); }
  }

  #mic-btn svg { width: 38px; height: 38px; transition: stroke 0.2s; }

  #mic-status {
    font-size: 14px; color: var(--muted); text-align: center;
    transition: color 0.2s; min-height: 20px;
  }
  #mic-status.active { color: var(--accent2); }

  #interim {
    font-size: 14px; color: var(--muted); font-style: italic;
    text-align: center; min-height: 20px; padding: 0 16px;
  }

  /* LIST */
  .list-wrap { width: 100%; }

  .list-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }

  .list-label {
    font-size: 11px; font-weight: 500; letter-spacing: 1.2px;
    color: var(--muted); text-transform: uppercase;
  }

  #count-badge {
    font-size: 12px; color: var(--muted);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 999px; padding: 2px 10px;
  }

  #todo-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

  .todo-item {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 13px 14px;
    animation: slideIn 0.22s ease;
    transition: opacity 0.2s;
  }
  .todo-item.done { opacity: 0.35; }
  .todo-item.done .todo-text { text-decoration: line-through; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .todo-check {
    width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; margin-top: 1px;
    border: 1.5px solid rgba(255,255,255,0.2); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .todo-check.checked { background: var(--green); border-color: var(--green); }
  .todo-check.checked::after {
    content: ''; display: block; width: 6px; height: 10px;
    border: 2px solid #0f0f11; border-top: none; border-left: none;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  .todo-text { flex: 1; font-size: 15px; line-height: 1.5; }

  .todo-del {
    width: 28px; height: 28px; border-radius: 8px; border: none;
    background: transparent; color: var(--muted); cursor: pointer;
    font-size: 20px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .todo-del:active { background: rgba(248,113,113,0.15); color: var(--danger); }

  #empty {
    text-align: center; color: var(--muted); font-size: 14px; padding: 32px 0;
  }

  /* EMAIL BUTTON */
  #mail-btn {
    width: 100%; padding: 16px;
    background: transparent; border: 1px solid var(--border);
    border-radius: 16px; color: var(--muted);
    font-size: 15px; font-family: inherit; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: all 0.2s;
  }
  #mail-btn:active { border-color: var(--accent); color: var(--accent2); }
  #mail-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo-dot"></div>
    <h1>音声Todoメモ</h1>
  </div>
  <div class="header-sub">タップして話す → 繰り返し入力 → メールで送る</div>
</header>

<div class="main">

  <div class="mic-wrap">
    <button id="mic-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </button>
    <div id="mic-status">タップして音声入力開始</div>
    <div id="interim"></div>
  </div>

  <div class="list-wrap">
    <div class="list-header">
      <span class="list-label">タスク一覧</span>
      <span id="count-badge">0件</span>
    </div>
    <ul id="todo-list"></ul>
    <div id="empty">タスクがありません<br><span style="font-size:12px;opacity:0.6">マイクボタンを押して話してください</span></div>
  </div>

  <button id="mail-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="4" width="20" height="16" rx="2"/>
      <path d="M2 7l10 7 10-7"/>
    </svg>
    メールで送る
  </button>

</div>

<script>
  let todos = [];
  let listening = false;
  let recognition = null;

  const micBtn = document.getElementById('mic-btn');
  const micStatus = document.getElementById('mic-status');
  const interimEl = document.getElementById('interim');
  const listEl = document.getElementById('todo-list');
  const emptyEl = document.getElementById('empty');
  const countBadge = document.getElementById('count-badge');
  const mailBtn = document.getElementById('mail-btn');

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SR) {
    micStatus.textContent = '音声認識に対応していないブラウザです';
    micBtn.style.opacity = '0.4';
    micBtn.style.pointerEvents = 'none';
  } else {
    setupRecognition();
  }

  function setupRecognition() {
    recognition = new SR();
    recognition.lang = 'ja-JP';
    recognition.continuous = false;
    recognition.interimResults = true;

    recognition.onstart = () => {
      micStatus.textContent = '聞いています...';
      micStatus.classList.add('active');
    };

    recognition.onresult = (e) => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += t;
        else interim += t;
      }
      interimEl.textContent = interim;
      if (final.trim()) {
        // 読点・句点・接続詞で分割
        const parts = final.trim()
          .split(/[、。,，\n]|(?:あと|それと|そして|また)(?=\S)/)
          .map(s => s.trim()).filter(s => s.length > 0);
        parts.forEach(addTodo);
        interimEl.textContent = '';
      }
    };

    recognition.onerror = (e) => {
      if (e.error === 'no-speech') {
        // 無音でも継続
        if (listening) restartRecognition();
      } else {
        micStatus.textContent = 'エラー: ' + e.error;
        stopListening();
      }
    };

    recognition.onend = () => {
      // 連続モード：停止ボタンを押すまで再起動
      if (listening) restartRecognition();
      else showStopped();
    };
  }

  function restartRecognition() {
    interimEl.textContent = '';
    setTimeout(() => {
      if (listening) {
        try { recognition.start(); } catch(e) {}
      }
    }, 100);
  }

  function showStopped() {
    micBtn.classList.remove('listening');
    micStatus.textContent = 'タップして音声入力開始';
    micStatus.classList.remove('active');
    interimEl.textContent = '';
  }

  function stopListening() {
    listening = false;
    try { recognition.stop(); } catch(e) {}
    showStopped();
  }

  micBtn.addEventListener('click', () => {
    if (!SR) return;
    if (listening) {
      stopListening();
    } else {
      listening = true;
      micBtn.classList.add('listening');
      micStatus.textContent = '聞いています...';
      micStatus.classList.add('active');
      try { recognition.start(); } catch(e) {}
    }
  });

  function addTodo(text) {
    text = text.trim();
    if (!text) return;
    todos.unshift({ id: Date.now() + Math.random(), text, done: false });
    render();
  }

  function render() {
    listEl.innerHTML = '';
    countBadge.textContent = todos.length + '件';
    emptyEl.style.display = todos.length ? 'none' : 'block';

    todos.forEach(t => {
      const li = document.createElement('li');
      li.className = 'todo-item' + (t.done ? ' done' : '');

      const check = document.createElement('div');
      check.className = 'todo-check' + (t.done ? ' checked' : '');
      check.addEventListener('click', () => { t.done = !t.done; render(); });

      const span = document.createElement('span');
      span.className = 'todo-text';
      span.textContent = t.text;

      const del = document.createElement('button');
      del.className = 'todo-del';
      del.innerHTML = '&times;';
      del.addEventListener('click', () => { todos = todos.filter(x => x.id !== t.id); render(); });

      li.appendChild(check);
      li.appendChild(span);
      li.appendChild(del);
      listEl.appendChild(li);
    });
  }

  render();

  // メール送信
  mailBtn.addEventListener('click', () => {
    if (todos.length === 0) {
      alert('タスクがありません');
      return;
    }
    const lines = todos
      .map((t, i) => `${i + 1}. ${t.done ? '[完了] ' : ''}${t.text}`)
      .join('\n');
    const subject = encodeURIComponent('Todoリスト');
    const body = encodeURIComponent(lines);
    window.location.href = `mailto:?subject=${subject}&body=${body}`;
  });
</script>
</body>
</html>
