<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音声Todoメモ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --surface2: #222228;
    --border: rgba(255,255,255,0.08);
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #f0eeff;
    --muted: rgba(240,238,255,0.45);
    --danger: #f87171;
    --green: #34d399;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px;
  }

  header {
    padding: 32px 24px 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(124,106,247,0.08) 0%, transparent 100%);
  }

  .header-top {
    display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
  }

  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 12px var(--accent);
    animation: breathe 2s ease-in-out infinite;
  }

  @keyframes breathe {
    0%,100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  h1 { font-size: 20px; font-weight: 500; letter-spacing: -0.3px; }

  .header-sub { font-size: 12px; color: var(--muted); padding-left: 18px; }

  .main { padding: 24px 20px; }

  /* MIC BUTTON */
  .mic-wrap {
    display: flex; flex-direction: column; align-items: center; margin-bottom: 28px;
  }

  #mic-btn {
    width: 80px; height: 80px; border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    cursor: pointer; position: relative;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; margin-bottom: 12px;
    -webkit-appearance: none;
  }

  #mic-btn:active { transform: scale(0.93); }

  #mic-btn.listening {
    border-color: var(--accent);
    background: rgba(124,106,247,0.12);
    box-shadow: 0 0 0 0 rgba(124,106,247,0.5);
    animation: ripple 1.2s infinite;
  }

  @keyframes ripple {
    0% { box-shadow: 0 0 0 0 rgba(124,106,247,0.5); }
    70% { box-shadow: 0 0 0 20px rgba(124,106,247,0); }
    100% { box-shadow: 0 0 0 0 rgba(124,106,247,0); }
  }

  #mic-btn svg { width: 32px; height: 32px; transition: stroke 0.2s; }
  #mic-btn.listening svg { stroke: var(--accent2); }

  #mic-status {
    font-size: 13px; color: var(--muted); text-align: center;
    min-height: 18px; transition: color 0.2s;
  }
  #mic-status.active { color: var(--accent2); }

  #interim {
    font-size: 14px; color: var(--muted); text-align: center;
    min-height: 20px; font-style: italic; margin-top: 6px;
    padding: 0 20px;
  }

  /* MANUAL INPUT */
  .input-row {
    display: flex; gap: 8px; margin-bottom: 28px;
  }

  .input-row input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
    font-size: 15px; color: var(--text); font-family: inherit; outline: none;
    transition: border-color 0.2s;
  }
  .input-row input::placeholder { color: var(--muted); }
  .input-row input:focus { border-color: var(--accent); }

  .input-row button {
    background: var(--accent); border: none; border-radius: 12px;
    padding: 12px 18px; color: white; font-size: 14px; font-weight: 500;
    cursor: pointer; white-space: nowrap; font-family: inherit;
    transition: opacity 0.15s;
  }
  .input-row button:active { opacity: 0.8; }

  /* TODO LIST */
  .section-label {
    font-size: 11px; font-weight: 500; letter-spacing: 1.2px;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 12px; display: flex; align-items: center;
    justify-content: space-between;
  }

  #count-badge {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 999px; padding: 2px 8px;
    font-size: 11px; color: var(--muted); letter-spacing: 0;
    text-transform: none; font-weight: 400;
  }

  #todo-list { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }

  .todo-item {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 13px 14px;
    transition: opacity 0.2s, border-color 0.2s;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .todo-item.done { opacity: 0.38; }
  .todo-item.done .todo-text { text-decoration: line-through; }

  .todo-check {
    width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; margin-top: 1px;
    border: 1.5px solid rgba(255,255,255,0.2);
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .todo-check.checked { background: var(--green); border-color: var(--green); }
  .todo-check.checked::after {
    content: ''; display: block; width: 6px; height: 10px;
    border: 2px solid #0f0f11; border-top: none; border-left: none;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  .todo-text { flex: 1; font-size: 15px; line-height: 1.45; }

  .todo-del {
    width: 28px; height: 28px; border-radius: 8px; border: none;
    background: transparent; color: var(--muted); cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .todo-del:hover, .todo-del:active { background: rgba(248,113,113,0.15); color: var(--danger); }

  #empty {
    text-align: center; color: var(--muted); font-size: 14px;
    padding: 40px 0; display: none;
  }

  /* EMAIL SECTION */
  .email-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px;
  }

  .email-section .section-label { margin-bottom: 14px; }

  .email-section input, .email-section textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 14px;
    font-size: 14px; color: var(--text); font-family: inherit;
    outline: none; margin-bottom: 10px; transition: border-color 0.2s;
  }
  .email-section input:focus, .email-section textarea:focus { border-color: var(--accent); }
  .email-section input::placeholder, .email-section textarea::placeholder { color: var(--muted); }
  .email-section textarea { resize: vertical; min-height: 80px; font-size: 13px; }

  .email-actions { display: flex; gap: 8px; }

  .btn-fill-list {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px; font-size: 13px; color: var(--muted);
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .btn-fill-list:active { border-color: var(--accent); color: var(--accent2); }

  .btn-send {
    flex: 1; background: var(--accent); border: none;
    border-radius: 10px; padding: 11px; font-size: 13px; color: white;
    font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity 0.15s;
  }
  .btn-send:active { opacity: 0.8; }

  .sent-msg {
    text-align: center; font-size: 13px; color: var(--green);
    margin-top: 10px; min-height: 20px;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo-dot"></div>
    <h1>音声Todoメモ</h1>
  </div>
  <div class="header-sub">話してタスクを追加 → メールで送信</div>
</header>

<div class="main">

  <!-- MIC -->
  <div class="mic-wrap">
    <button id="mic-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </button>
    <div id="mic-status">タップして音声入力</div>
    <div id="interim"></div>
  </div>

  <!-- MANUAL -->
  <div class="input-row">
    <input type="text" id="manual-input" placeholder="手動でタスクを入力...">
    <button id="add-btn">追加</button>
  </div>

  <!-- LIST -->
  <div class="section-label">
    タスク一覧
    <span id="count-badge">0件</span>
  </div>
  <ul id="todo-list"></ul>
  <div id="empty">タスクがありません</div>

  <!-- EMAIL -->
  <div class="email-section">
    <div class="section-label">メールで送る</div>
    <input type="email" id="email-to" placeholder="送信先メールアドレス">
    <input type="text" id="email-subject" placeholder="件名" value="Todoリスト">
    <textarea id="email-body" placeholder="本文（タスク一覧が自動で挿入されます）"></textarea>
    <div class="email-actions">
      <button class="btn-fill-list" id="fill-btn">タスクを挿入</button>
      <button class="btn-send" id="send-btn">メールを開く</button>
    </div>
    <div class="sent-msg" id="sent-msg"></div>
  </div>

</div>

<script>
  let todos = [];
  let listening = false;

  const micBtn = document.getElementById('mic-btn');
  const micStatus = document.getElementById('mic-status');
  const interimEl = document.getElementById('interim');
  const manualInput = document.getElementById('manual-input');
  const addBtn = document.getElementById('add-btn');
  const listEl = document.getElementById('todo-list');
  const emptyEl = document.getElementById('empty');
  const countBadge = document.getElementById('count-badge');
  const emailTo = document.getElementById('email-to');
  const emailSubject = document.getElementById('email-subject');
  const emailBody = document.getElementById('email-body');
  const fillBtn = document.getElementById('fill-btn');
  const sendBtn = document.getElementById('send-btn');
  const sentMsg = document.getElementById('sent-msg');

  // Speech Recognition
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;

  if (!SR) {
    micStatus.textContent = '音声認識非対応（手動入力をご利用ください）';
    micBtn.style.opacity = '0.4';
    micBtn.style.pointerEvents = 'none';
  } else {
    recognition = new SR();
    recognition.lang = 'ja-JP';
    recognition.continuous = false;
    recognition.interimResults = true;

    recognition.onstart = () => {
      listening = true;
      micBtn.classList.add('listening');
      micStatus.textContent = '聞いています...';
      micStatus.classList.add('active');
    };

    recognition.onresult = (e) => {
      let interim = '', final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += t;
        else interim += t;
      }
      interimEl.textContent = interim || final;
      if (final.trim()) {
        // 読点・句点・「と」「あと」などで分割
        const parts = final.trim()
          .split(/[、。,，\n]|(?:あと|それと|そして|また)/)
          .map(s => s.trim()).filter(s => s.length > 0);
        parts.forEach(p => addTodo(p));
      }
    };

    recognition.onerror = (e) => {
      micStatus.textContent = e.error === 'no-speech' ? '音声が検出されませんでした' : 'エラー: ' + e.error;
      stopListening();
    };

    recognition.onend = () => stopListening();
  }

  function stopListening() {
    listening = false;
    micBtn.classList.remove('listening');
    micStatus.textContent = 'タップして音声入力';
    micStatus.classList.remove('active');
    interimEl.textContent = '';
  }

  micBtn.addEventListener('click', () => {
    if (!recognition) return;
    if (listening) { recognition.stop(); return; }
    try { recognition.start(); } catch(e) {}
  });

  // Manual add
  addBtn.addEventListener('click', () => { addTodo(manualInput.value); manualInput.value = ''; });
  manualInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { addTodo(manualInput.value); manualInput.value = ''; }
  });

  function addTodo(text) {
    text = text.trim();
    if (!text) return;
    todos.unshift({ id: Date.now() + Math.random(), text, done: false });
    render();
  }

  function render() {
    listEl.innerHTML = '';
    countBadge.textContent = todos.length + '件';
    emptyEl.style.display = todos.length ? 'none' : 'block';

    todos.forEach(t => {
      const li = document.createElement('li');
      li.className = 'todo-item' + (t.done ? ' done' : '');

      const check = document.createElement('div');
      check.className = 'todo-check' + (t.done ? ' checked' : '');
      check.addEventListener('click', () => { t.done = !t.done; render(); });

      const span = document.createElement('span');
      span.className = 'todo-text';
      span.textContent = t.text;

      const del = document.createElement('button');
      del.className = 'todo-del';
      del.innerHTML = '&times;';
      del.addEventListener('click', () => { todos = todos.filter(x => x.id !== t.id); render(); });

      li.appendChild(check); li.appendChild(span); li.appendChild(del);
      listEl.appendChild(li);
    });
  }

  render();

  // Email
  fillBtn.addEventListener('click', () => {
    if (todos.length === 0) { sentMsg.textContent = 'タスクがありません'; setTimeout(() => sentMsg.textContent = '', 2000); return; }
    const lines = todos.map((t, i) => `${i + 1}. [${t.done ? '完了' : '未完了'}] ${t.text}`).join('\n');
    emailBody.value = '--- Todoリスト ---\n' + lines + '\n\n';
    sentMsg.textContent = '';
  });

  sendBtn.addEventListener('click', () => {
    const to = emailTo.value.trim();
    const subject = encodeURIComponent(emailSubject.value || 'Todoリスト');
    const body = encodeURIComponent(emailBody.value || '');
    const mailto = `mailto:${to}?subject=${subject}&body=${body}`;
    window.location.href = mailto;
    sentMsg.textContent = 'メールアプリを開いています...';
    setTimeout(() => sentMsg.textContent = '', 3000);
  });
</script>
</body>
</html>
